server:
  port: 8080

spring:
  application:
    name: PersonalBlog-backend
  datasource:
    url: jdbc:mysql://localhost:3306/blog?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  mail:
    host: smtp.gmail.com
    port: 465
    username: czf871953354@gmail.com
    password: your_password
    protocol: smtp
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.czf.blog.entity
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true


# http://localhost:8080/doc.html
# Swagger UI：http://localhost:8080/swagger-ui/index.html
# OpenAPI JSON：http://localhost:8080/v3/api-docs
springdoc:
  swagger-ui:
    enabled: true
  api-docs:
    enabled: true

knife4j:
  setting:
    language: zh_CN

jwt:
  secret: "CHANGE_ME_TO_A_LONG_RANDOM_SECRET"
  access-expire-minutes: 30
  refresh-expire-days: 7

oauth:
  providers:
    github:
      enabled: true
      client-id: ""
      client-secret: ""
      redirect-uri: "http://localhost:5173/oauth/callback/github"
      authorize-url: "https://github.com/login/oauth/authorize"
      token-url: "https://github.com/login/oauth/access_token"
      user-info-url: "https://api.github.com/user"
      scope: "read:user user:email"
      user-id-field: "id"
      username-field: "login"
      avatar-field: "avatar_url"
      access-token-in-query: false
      access-token-field: "access_token"
    google:
      enabled: false
      client-id: ""
      client-secret: ""
      redirect-uri: ""
      authorize-url: "https://accounts.google.com/o/oauth2/v2/auth"
      token-url: "https://oauth2.googleapis.com/token"
      user-info-url: "https://openidconnect.googleapis.com/v1/userinfo"
      scope: "openid email profile"
      user-id-field: "sub"
      username-field: "name"
      avatar-field: "picture"
      access-token-in-query: false
      access-token-field: "access_token"
    sina:
      enabled: false
      client-id: ""
      client-secret: ""
      redirect-uri: ""
      authorize-url: ""
      token-url: ""
      user-info-url: ""
      scope: ""
      user-id-field: ""
      username-field: ""
      avatar-field: ""
      access-token-in-query: true
      access-token-field: "access_token"
