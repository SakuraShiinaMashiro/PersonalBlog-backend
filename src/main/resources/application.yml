server:
  port: 8080

spring:
  application:
    name: PersonalBlog-backend
  datasource:
    url: jdbc:mysql://localhost:3306/blog?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  mail:
    host: smtp.google.com
    port: 465
    username: czf871953354@gmail.com
    password: your_password
    protocol: smtp
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.czf.blog.entity
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true


# http://localhost:8080/doc.html
# Swagger UI：http://localhost:8080/swagger-ui/index.html
# OpenAPI JSON：http://localhost:8080/v3/api-docs
springdoc:
  swagger-ui:
    enabled: true
  api-docs:
    enabled: true

knife4j:
  setting:
    language: zh_CN

jwt:
  secret: "CHANGE_ME_TO_A_LONG_RANDOM_SECRET"
  access-expire-minutes: 30
  refresh-expire-days: 7

