server:
  port: 8080

spring:
  profiles:
    active: dev
  application:
    name: PersonalBlog-backend
  datasource:
    url: jdbc:mysql://localhost:3306/blog?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.czf.blog.entity
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true


# http://localhost:8080/doc.html
# Swagger UI：http://localhost:8080/swagger-ui/index.html
# OpenAPI JSON：http://localhost:8080/v3/api-docs
springdoc:
  swagger-ui:
    enabled: true
  api-docs:
    enabled: true

knife4j:
  setting:
    language: zh_CN

jwt:
  secret: ${JWT_SECRET:CHANGE_ME_TO_A_LONG_RANDOM_SECRET}
  access-expire-minutes: 30
  refresh-expire-days: 7

oauth:
  providers:
    github:
      enabled: true
      client-id: ${OAUTH_GITHUB_CLIENT_ID:}
      client-secret: ${OAUTH_GITHUB_CLIENT_SECRET:}
      redirect-uri: http://localhost:8080/api/auth/oauth/github/callback
      authorize-url: "https://github.com/login/oauth/authorize"
      token-url: "https://github.com/login/oauth/access_token"
      user-info-url: "https://api.github.com/user"
      scope: "read:user user:email"
      user-id-field: "id"
      username-field: "login"
      avatar-field: "avatar_url"
      access-token-in-query: false
      access-token-field: "access_token"
    google:
      enabled: false
      client-id: ${OAUTH_GOOGLE_CLIENT_ID:}
      client-secret: ${OAUTH_GOOGLE_CLIENT_SECRET:}
      redirect-uri: ${OAUTH_GOOGLE_REDIRECT_URI:}
      authorize-url: "https://accounts.google.com/o/oauth2/v2/auth"
      token-url: "https://oauth2.googleapis.com/token"
      user-info-url: "https://openidconnect.googleapis.com/v1/userinfo"
      scope: "openid email profile"
      user-id-field: "sub"
      username-field: "name"
      avatar-field: "picture"
      access-token-in-query: false
      access-token-field: "access_token"
    sina:
      enabled: false
      client-id: ${OAUTH_SINA_CLIENT_ID:}
      client-secret: ${OAUTH_SINA_CLIENT_SECRET:}
      redirect-uri: ${OAUTH_SINA_REDIRECT_URI:}
      authorize-url: ${OAUTH_SINA_AUTHORIZE_URL:}
      token-url: ${OAUTH_SINA_TOKEN_URL:}
      user-info-url: ${OAUTH_SINA_USER_INFO_URL:}
      scope: ${OAUTH_SINA_SCOPE:}
      user-id-field: ${OAUTH_SINA_USER_ID_FIELD:}
      username-field: ${OAUTH_SINA_USERNAME_FIELD:}
      avatar-field: ${OAUTH_SINA_AVATAR_FIELD:}
      access-token-in-query: true
      access-token-field: "access_token"
